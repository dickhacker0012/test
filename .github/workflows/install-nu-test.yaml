name: Install Nushell Test

on:
  workflow_dispatch:

jobs:
  job:
    runs-on: ubuntu-latest

    steps:
      - name: Download and Install Nushell
        run: |
          curl -L https://github.com/nushell/nushell/releases/download/0.91.0/nu-0.91.0-x86_64-unknown-linux-gnu.tar.gz -o nu.tar.gz
          tar -xf nu.tar.gz
          sudo mv nu-*-linux-gnu/nu /usr/local/bin/nu
          nu --version
